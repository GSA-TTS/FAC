name: Sync updated aln workbook files to FAC-transition-site 

# Manually triggered. Run this from the Actions tab (or `gh workflow run`) and
# supply the PR number you want to sync from FAC.
on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: "FAC pull request number to sync from"
        required: true
        type: number

permissions:
  contents: read

jobs:
  sync-files:
    runs-on: ubuntu-latest
    steps:
      # 1. Look up the PR so we have its title and head commit SHA.
      - name: Look up PR
        id: pr
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          data=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.inputs.pr_number }}")
          echo "sha=$(echo "$data" | jq -r .head.sha)" >> "$GITHUB_OUTPUT"
          echo "title=$(echo "$data" | jq -r .title)" >> "$GITHUB_OUTPUT"
          echo "url=$(echo "$data" | jq -r .html_url)" >> "$GITHUB_OUTPUT"
 
      # 2. Check out FAC at that PR's head commit so we have the latest files
      - name: Checkout FAC
        uses: actions/checkout@v4
        with:
          path: fac
          ref: ${{ steps.pr.outputs.sha }}
 
      # 3. Check out FAC-transition-site so we can copy files into it and open a PR there.
      #    STATIC_SITE_DEPLOY_KEY must be a PAT (classic or fine-grained) with write access
      #    to FAC-transition-site, stored as a secret in FAC's settings.
      - name: Checkout FAC-transition-site
        uses: actions/checkout@v4
        with:
          repository: GSA-TTS/FAC-transition-site
          token: ${{ secrets.STATIC_SITE_DEPLOY_KEY }}
          path: fac-transition-site


      # 4. Copy the specific list of files/folders from FAC into FAC-transition-site.
      #    Edit FILES below — one "source:dest" pair per line, paths relative
      #    to each repo's root. Source can be a file or a directory.
      - name: Copy files
        run: |
          set -euo pipefail

          FILES=(
            "backend/schemas/output/excel/xlsx:assets/workbooks"
          )

          for pair in "${FILES[@]}"; do
            src="${pair%%:*}"
            dest="${pair##*:}"

            src_path="FAC/${src}"
            dest_path="FAC-transition-site/${dest}"

            if [ ! -e "$src_path" ]; then
              echo "::warning::Source not found, skipping: $src_path"
              continue
            fi

            mkdir -p "$(dirname "$dest_path")"
            cp -r "$src_path" "$dest_path"
            echo "Copied $src_path -> $dest_path"
          done

      # 5. Open (or update) a PR in FAC-transition-site with the copied changes.
      #    If nothing changed, this action is a no-op.
      - name: Create pull request in FAC-transition-site
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.STATIC_SITE_DEPLOY_KEY }}
          path: fac-transition-site
          commit-message: "Sync files from FAC PR #${{ github.event.inputs.pr_number }}"
          branch: sync/fac-pr-${{ github.event.inputs.pr_number }}
          title: "Sync files from FAC PR #${{ github.event.inputs.pr_number }}: ${{ steps.pr.outputs.title }}"
          body: |
            Manually triggered sync from [FAC PR #${{ github.event.inputs.pr_number }}](${{ steps.pr.outputs.url }}).
 
            This PR was generated by a GitHub Actions workflow and copies a fixed
            list of files from FAC to FAC-transition-site. Review the diff before merging.
          delete-branch: true
