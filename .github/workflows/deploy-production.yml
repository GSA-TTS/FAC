---
name: Deploy to the Production Environment
on:
  push:
    tags:
      - v1.*
      
permissions:
  contents: read
  
jobs:
  deploy-infrastructure:
    name: Deploy infrastructure
    uses: ./.github/workflows/terraform-deploy-prod.yml
    with:
      environment: "production"
    secrets: inherit

  deploy-application:
    name: Deploy application
    uses: ./.github/workflows/deploy-application.yml
    with:
      environment: "production"
    secrets: inherit

  new-relic-record:
    name: Record deployment to New Relic
    needs:
      - deploy-application
    uses: ./.github/workflows/deploy-record-newrelic-deployment.yml
    with:
      environment: "production"
    secrets: inherit

  scan-production-post-deploy:
    name: Zap Scan
    needs:
      - deploy-application
    uses: ./.github/workflows/scanning-zap-scan.yml
    with:
      url: "https://app.fac.gov/"
