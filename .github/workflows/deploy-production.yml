---
name: Deploy to the Production Environment
on:
  push:
    tags:
      - v1.*
      
permissions:
  contents: read
  
jobs:
  check-for-changes:
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      terraform: ${{ steps.filter.outputs.terraform }}
    steps:
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          base: 'prod'
          filters: |
            backend:
              - './backend/**'
            terraform:
              - './terraform/**'

  deploy-infrastructure:
    name: Deploy infrastructure
    needs: 
      - check-for-changes
    if: needs.check-for-changes.outputs.terraform == 'true'
    uses: ./.github/workflows/terraform-apply-env.yml
    with:
      environment: "production"
      autoapprove: false
    secrets: inherit

  deploy-application:
    name: Deploy application
    needs: 
      - check-for-changes
    if: needs.check-for-changes.outputs.backend == 'true'
    uses: ./.github/workflows/deploy-application.yml
    with:
      environment: "production"
    secrets: inherit

  new-relic-record:
    name: Record deployment to New Relic
    needs:
      - deploy-application
    uses: ./.github/workflows/deploy-record-newrelic-deployment.yml
    with:
      environment: "production"
    secrets: inherit

  scan-production-post-deploy:
    name: Zap Scan
    needs:
      - deploy-application
    uses: ./.github/workflows/scanning-zap-scan.yml
    with:
      url: "https://app.fac.gov/"
